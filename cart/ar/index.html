<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلة التسوق | فاتان ميجا سوبر ماركت</title>
    <link rel="stylesheet" href="../../style.css">
</head>
<body>
    <header class="main-header">
        <a href="../../ar/" class="logo-link">
            <img src="../../images/vatan_logo.jpg" alt="Logo" width="250" height="80" class="brand-logo">
        </a>
        <nav class="main-nav">
            <a href="../../ar/">العودة إلى الرئيسية</a>
        </nav>
    </header>

    <main class="cart-page-container">
        <h1 class="cart-title">سلة التسوق الخاصة بي</h1>
        
        <div class="cart-layout">
            <section class="cart-items">
                <article class="cart-item">
                    <img src="../../images/dana-kiyma.jpg" alt="لحم بقر مفروم" width="100" height="75">
                    <div class="item-details">
                        <h3>لحم بقر مفروم طازج فاتان</h3>
                        <p class="item-price">€12.50</p>
                    </div>
                    <div class="item-quantity">
                        <input type="number" value="1" min="1" max="10">
                    </div>
                    <button class="remove-btn">إزالة</button>
                </article>
            </section>

            <aside class="cart-summary">
                <h2>ملخص الطلب</h2>
                <div class="summary-row">
                    <span>المجموع الفرعي:</span>
                    <span>€12.50</span>
                </div>
                <div class="summary-row">
                    <span>ضريبة القيمة المضافة (6%):</span>
                    <span>€0.75</span>
                </div>
                <div class="summary-total">
                    <span>المجموع الإجمالي:</span>
                    <span>€13.25</span>
                </div>
                <button class="btn-primary checkout-btn">إتمام الطلب</button>
            </aside>
        </div>
    </main>
</body>
</html>
