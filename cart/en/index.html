<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | Vatan Mega Supermarkt</title>
    <link rel="stylesheet" href="../../style.css">
</head>
<body>
    <header class="main-header">
        <a href="../../en/" class="logo-link">
            <img src="../../images/vatan_logo.jpg" alt="Logo" width="250" height="80" class="brand-logo">
        </a>
        <nav class="main-nav">
            <a href="../../en/">Back to Home</a>
        </nav>
    </header>

    <main class="cart-page-container">
        <h1 class="cart-title">My Shopping Cart</h1>
        
        <div class="cart-layout">
            <section class="cart-items">
                <article class="cart-item">
                    <img src="../../images/dana-kiyma.jpg" alt="Minced Beef" width="100" height="75">
                    <div class="item-details">
                        <h3>Vatan Fresh Minced Beef</h3>
                        <p class="item-price">€12.50</p>
                    </div>
                    <div class="item-quantity">
                        <input type="number" value="1" min="1" max="10">
                    </div>
                    <button class="remove-btn">Remove</button>
                </article>
            </section>

            <aside class="cart-summary">
                <h2>Order Summary</h2>
                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span>€12.50</span>
                </div>
                <div class="summary-row">
                    <span>VAT (6%):</span>
                    <span>€0.75</span>
                </div>
                <div class="summary-total">
                    <span>Total:</span>
                    <span>€13.25</span>
                </div>
                <button class="btn-primary checkout-btn">Checkout</button>
            </aside>
        </div>
    </main>
</body>
</html>
